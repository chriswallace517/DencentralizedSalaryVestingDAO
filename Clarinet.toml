[project]
name = 'DecentralizeSalaryVestingDAO'
description = 'A decentralized salary vesting system for DAOs built on Stacks blockchain'
authors = ['DAO Developer']
telemetry = true
cache_dir = '.\.cache'
requirements = []

[contracts.Salarypool]
path = 'contracts/Salarypool.clar'
clarity_version = 3
epoch = 3.0

[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'

